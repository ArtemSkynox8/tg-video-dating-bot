services:
  bot:
    build: .
    env_file: .env
    depends_on:
      - postgres
    ports:
      - "8080:8080"

  migrate:
    image: migrate/migrate:4
    profiles: ["tools"]
    volumes:
      - ./migrations:/migrations:ro
    command: ["-path", "/migrations", "-database", "postgres://robux:robux@postgres:5432/robux?sslmode=disable", "up"]
    depends_on:
      - postgres

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: robux
      POSTGRES_PASSWORD: robux
      POSTGRES_DB: robux
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  postgres_data:
