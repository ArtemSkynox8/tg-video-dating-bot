services:
  bot:
    build: .
    env_file: .env
    depends_on:
      - postgres
      - redis
    ports:
      - "8080:8080"

  migrate:
    image: migrate/migrate:4
    profiles: ["tools"]
    volumes:
      - ./migrations:/migrations:ro
    command: ["-path", "/migrations", "-database", "postgres://dating:dating@postgres:5432/dating?sslmode=disable", "up"]
    depends_on:
      - postgres

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: dating
      POSTGRES_PASSWORD: dating
      POSTGRES_DB: dating
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
